services:
  nginx:
    image: nginx:1.27-alpine
    container_name: loyalty-nginx
    ports:
      - '${FRONTEND_PORT}:80'
    environment:
      FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT}
      QR_SERVICE_PORT: ${QR_SERVICE_PORT}
    volumes:
      - ./nginx/default.nginx:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      frontend:
        condition: service_started
      qr-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_QR_API_URL: ${VITE_QR_API_URL}
    container_name: loyalty-frontend
    expose:
      - '${FRONTEND_INTERNAL_PORT}'
    depends_on:
      - qr-service

  qr-service:
    build:
      context: ./qr-service
    container_name: loyalty-qr-service
    environment:
      QR_SERVICE_PORT: ${QR_SERVICE_PORT}
      REDIS_URL: ${REDIS_URL}
      QR_TOKEN_MAX_ATTEMPTS: ${QR_TOKEN_MAX_ATTEMPTS}
    expose:
      - '${QR_SERVICE_PORT}'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:${QR_SERVICE_PORT}/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    container_name: loyalty-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '5001:6379'
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis_data:
