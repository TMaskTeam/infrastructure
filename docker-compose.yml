services:
  nginx:
    image: nginx:1.27
    container_name: loyalty-nginx
    ports:
      - '${FRONTEND_PORT}:80'
      - '443:443'
    environment:
      FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT}
      QR_SERVICE_PORT: ${QR_SERVICE_PORT}
    volumes:
      - ./nginx/default.nginx:/etc/nginx/templates/default.conf.template:ro
    entrypoint: sh -c "mkdir -p /etc/nginx/ssl && openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout /etc/nginx/ssl/key.pem -out /etc/nginx/ssl/cert.pem -subj '/CN=localhost' 2>/dev/null && /docker-entrypoint.sh nginx -g 'daemon off;'"
    depends_on:
      frontend:
        condition: service_started
      qr-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_QR_API_URL: ${VITE_QR_API_URL}
        VITE_DEV: ${VITE_DEV}
    container_name: loyalty-frontend
    expose:
      - '${FRONTEND_INTERNAL_PORT}'
    depends_on:
      - qr-service

  qr-service:
    build:
      context: ./qr-service
    container_name: loyalty-qr-service
    environment:
      QR_SERVICE_PORT: ${QR_SERVICE_PORT}
      REDIS_URL: ${REDIS_URL}
      QR_TOKEN_MAX_ATTEMPTS: ${QR_TOKEN_MAX_ATTEMPTS}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_DBNAME: ${DATABASE_DBNAME}
    expose:
      - '${QR_SERVICE_PORT}'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:${QR_SERVICE_PORT}/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    container_name: loyalty-redis
    command: ['redis-server', '--appendonly', 'yes']
    # ports:
    #   - '5001:6379'
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    container_name: loyalty-postgres
    image: postgres:14.21-alpine
    shm_size: 128mb
    restart: always
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_DBNAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_DBNAME}']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  backend:
    depends_on:
      db:
        condition: service_healthy
    container_name: loyalty-backend
    build:
      context: ./backend
    restart: always
    environment:
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_DBNAME=${DATABASE_DBNAME}
      - SERVER_PORT=80
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
    healthcheck:
      test:
        - CMD-SHELL
        - |
          wget --no-verbose --tries=1 --spider "http://127.0.0.1:80/ping" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend/src/api/public:/app/src/api/public

volumes:
  postgres_data:
  redis_data:
